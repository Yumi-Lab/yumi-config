#####################################################################
# YUMI QC — Quality Control Macros (C235 CHROMAX X12)
# Chaque macro signale son statut via RESPOND MSG="QC:{test_id}:{STATUS}"
# STATUS: START, PASS, FAIL, VISUAL (attente confirmation opérateur)
#
# Ordre du protocole usine :
#   0. MCU + firmware (YUMI_CONFIG gravé)  (automatique)
#   1. Ventilateur carte mère        (visuel oui/non)
#   2. Cooling fan (pièce)           (visuel oui/non)
#   3. Ventilateur hotend            (visuel oui/non)
#   4. Chauffe extruder 220°C        (mesure manuelle, reste chaud)
#   5. Chauffe plateau 60°C          (mesure manuelle)
#   6. Cutter TETE CHAUDE            (visuel — coince a froid, comme Bambu)
#   7. Home X                        (automatique, sensorless)
#   8. Home Y                        (automatique, sensorless)
#   9. Z tap home + montée Zmax      (visuel, checkpoint opérateur)
#  10. Z tap calibration course compl.(automatique, spread répétabilité)
#  11. Screws tilt adjust            (automatique, complet)
#  12. Bed mesh                      (automatique, SANS restart)
#  13. Feed E0 -> capteur tete PA8     (automatique)
#  14. Feed E1 -> capteur tete PA8     (automatique)
#
# Conçu pour le printer.cfg dédié qc_printer.cfg (généré depuis le
# backup de prod : capteurs YMS-1/YMS-2 standard avec runout_gcode
# → QC:Ex_ROTATION:FAIL).
#####################################################################

# === 0 : MCU + VARIABLE D'ENVIRONNEMENT FIRMWARE ===
# Vérifie que la carte mère est connectée ET que le firmware a bien été
# gravé par firmware.yumi-lab.com (constante YUMI_CONFIG dans le MCU).

# configfile.settings donne les noms de MCU en minuscules, mais printer[name]
# ne resout que si la casse correspond -> on skippe les MCU non resolus
# (ex: host SmartPiOne, casse mixte, sans YUMI_CONFIG de toute facon).
[gcode_macro QC_MCU_CHECK]
description: QC - Connexion MCU + identite firmware YUMI_CONFIG (multi-MCU)
gcode:
    RESPOND MSG="QC:MCU_CHECK:START"
    {% set ns = namespace(found=false) %}
    {% for name in printer.configfile.settings %}
      {% if (name == "mcu" or name.startswith("mcu ")) and printer[name] is defined %}
        {% set c = printer[name].mcu_constants %}
        {action_respond_info("[" ~ name ~ "] version: " ~ printer[name].mcu_version)}
        {% if c.YUMI_CONFIG is defined and c.YUMI_CONFIG %}
          {% set ns.found = true %}
          {action_respond_info("[" ~ name ~ "] " ~ c.YUMI_CONFIG)}
          {% if c.YUMI_COMMENT is defined and c.YUMI_COMMENT %}
            {action_respond_info("[" ~ name ~ "] comment: " ~ c.YUMI_COMMENT)}
          {% endif %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {% if printer["mcu SmartPiOne"] is defined %}
        {action_respond_info("[mcu SmartPiOne] version: " ~ printer["mcu SmartPiOne"].mcu_version ~ " (host SmartPi One)")}
    {% endif %}
    {% if ns.found %}
        RESPOND MSG="QC:MCU_CHECK:PASS"
    {% else %}
        RESPOND TYPE=error MSG="QC: aucune identite YUMI gravee sur les MCU (firmware non grave par firmware.yumi-lab.com)"
        RESPOND MSG="QC:MCU_CHECK:FAIL"
    {% endif %}

# === 1-4 : VENTILATEURS + CUTTER ===

[gcode_macro QC_FAN_MOTHERBOARD]
description: QC - Ventilateur carte mere (fan_generic pilote a 100%)
gcode:
    RESPOND MSG="QC:FAN_MOTHERBOARD:START"
    SET_FAN_SPEED FAN=Motherboard_Fan SPEED=1.0
    G4 P3000
    RESPOND MSG="QC:FAN_MOTHERBOARD:VISUAL"
    # Reste allume pour refroidir la carte pendant le reste du QC ;
    # QC_CLEANUP le coupe a la fin.

[gcode_macro QC_FAN_PART]
description: QC - Cooling fan (refroidissement piece) a 100%
gcode:
    RESPOND MSG="QC:FAN_PART:START"
    M106 S255
    G4 P2000
    RESPOND MSG="QC:FAN_PART:VISUAL"

[gcode_macro QC_CUTTER]
description: QC - Cutter : insere filament YMS-1 -> tete, extrude, coupe, retracte
gcode:
    RESPOND MSG="QC:CUTTER:START"
    _QC_BOARD_FAN_ON
    SET_FAN_SPEED FAN=hotend_fan SPEED=1.0
    M104 S220                   ; chauffe la buse (non bloquant)
    G28 X                       ; home X pendant la montee en temperature
    M109 S220                   ; ATTEND la tete chaude AVANT le feed (sinon le
                                ; filament froid arrive a la buse et coince)
    T1                          ; active YMS-1 (sync extruder0)
    ; feed YMS-1 jusqu'au capteur tete PA8, puis (mode cutter) extrude 60mm
    ; doucement + CUT_FILAMENT + retracte 120mm -> QC:CUTTER:VISUAL
    _QC_HEAD_FEED FEEDER=extruder0 ID=CUTTER SENSOR=YMS-1 MODE=cutter

[gcode_macro QC_FAN_HOTEND]
description: QC - Ventilateur hotend (fan_generic pilote a 100%, sans chauffe)
gcode:
    RESPOND MSG="QC:FAN_HOTEND:START"
    SET_FAN_SPEED FAN=hotend_fan SPEED=1.0
    G4 P2000
    RESPOND MSG="QC:FAN_HOTEND:VISUAL"
    # Reste allume pour le test de chauffe suivant ; QC_CLEANUP le coupe.

# === 5 : CHAUFFE EXTRUDER 220°C (controle manuel au thermometre) ===

[gcode_macro QC_HEAT_EXTRUDER]
description: QC - Chauffe a 220C, AUTO-valide si la temperature est atteinte
gcode:
    RESPOND MSG="QC:HEAT_EXTRUDER:START"
    SET_FAN_SPEED FAN=hotend_fan SPEED=1.0   ; anti heat-creep (fan manuel en mode QC)
    M104 S220
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM=215 MAXIMUM=240
    ; temperature atteinte -> validation automatique (reste chaud pour le cutter)
    RESPOND MSG="QC:HEAT_EXTRUDER:PASS"

# === 4b : CHAUFFE PLATEAU (AUTO) ===

[gcode_macro QC_HEAT_BED]
description: QC - Chauffe plateau, AUTO-valide si la temperature est atteinte
gcode:
    RESPOND MSG="QC:HEAT_BED:START"
    {% set bed_temp = params.TEMP|default(60)|int %}
    M140 S{bed_temp}
    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={bed_temp - 3}
    M140 S0   ; temperature atteinte -> coupe la chauffe + validation auto
    RESPOND MSG="QC:HEAT_BED:PASS"

# === 6-8 : HOMING ===
# NB : la verification homed_axes doit se faire dans une 2e macro,
# sinon le template Jinja est evalue AVANT le G28 (etat obsolete).
# IMPORTANT : en mode QC le ventilo carte mere est un fan_generic (non
# auto-gere). _QC_BOARD_FAN_ON le force ON au debut de chaque macro qui
# bouge les moteurs, pour garder la carte refroidie.

[gcode_macro _QC_BOARD_FAN_ON]
description: QC - Force le ventilo carte mere ON (fan manuel en mode QC)
gcode:
    SET_FAN_SPEED FAN=Motherboard_Fan SPEED=1.0

[gcode_macro _QC_VERIFY_HOMED]
description: QC - Verifie homed_axes apres un G28 (evalue a l'execution)
gcode:
    {% set axis = params.AXIS|lower %}
    {% set id = params.ID %}
    {% if axis in printer.toolhead.homed_axes %}
        RESPOND MSG="QC:{id}:PASS"
    {% else %}
        RESPOND MSG="QC:{id}:FAIL"
    {% endif %}

[gcode_macro QC_HOME_X]
description: QC - Home X (sensorless)
gcode:
    RESPOND MSG="QC:HOME_X:START"
    _QC_BOARD_FAN_ON
    G28 X
    _QC_VERIFY_HOMED AXIS=x ID=HOME_X

[gcode_macro QC_HOME_Y]
description: QC - Home Y (sensorless)
gcode:
    RESPOND MSG="QC:HOME_Y:START"
    _QC_BOARD_FAN_ON
    G28 Y
    _QC_VERIFY_HOMED AXIS=y ID=HOME_Y

[gcode_macro QC_HOME_Z]
description: QC - Home Z (probe), X et Y doivent etre homes avant
gcode:
    RESPOND MSG="QC:HOME_Z:START"
    _QC_BOARD_FAN_ON
    {% if "x" in printer.toolhead.homed_axes and "y" in printer.toolhead.homed_axes %}
        G28 Z
        _QC_VERIFY_HOMED AXIS=z ID=HOME_Z
    {% else %}
        {action_respond_info("QC: X et Y doivent etre homes avant Z")}
        RESPOND MSG="QC:HOME_Z:FAIL"
    {% endif %}

# === 8a : Z TAP HOME + montee Zmax (validation operateur) ===
# Position Z inconnue au depart -> 1 tap pour homer Z (savoir ou est le
# plateau), puis montee tout en haut (course complete) et checkpoint
# operateur que la montee s'est bien passee avant les taps de calibration.

[gcode_macro QC_Z_TAP_HOME]
description: QC - 1er tap (home Z) + montee Zmax + validation operateur
gcode:
    {% set z_max = printer.configfile.settings.stepper_z.position_max|float %}
    {% set top = z_max - 5 %}
    RESPOND MSG="QC:Z_TAP_HOME:START"
    _QC_BOARD_FAN_ON
    {% if "x" not in printer.toolhead.homed_axes or "y" not in printer.toolhead.homed_axes %}
        G28 X
        G28 Y
    {% endif %}
    # Position Z inconnue -> 1er tap pour etablir Z=0
    {% if "z" not in printer.toolhead.homed_axes %}
        G28 Z
    {% else %}
        YUMI_Z_TAP SAVE=0
    {% endif %}
    # Montee tout en haut (course complete)
    G90
    G1 Z{top} F1800
    M400
    RESPOND MSG="QC:Z_TAP_HOME:VISUAL"

# === 8b : Z TAP CALIBRATION course complete (repetabilite) ===
# Depuis Zmax, refait N taps en remontant tout en haut a chaque fois.
# Calibre le capteur de pression sur la course COMPLETE et mesure la
# repetabilite : chaque YUMI_Z_TAP reporte "VALIDATED: trigger_z=X.XXXX",
# l'engine QC collecte ces valeurs et calcule le spread. Un tap qui n'arrive
# pas a se stabiliser leve une erreur -> macro avorte -> FAIL.

[gcode_macro QC_Z_TAP_CALIB]
description: QC - Taps de calibration depuis la course complete (Zmax)
variable_reps: 3
gcode:
    {% set n = params.N|default(printer["gcode_macro QC_Z_TAP_CALIB"].reps)|int %}
    {% set z_max = printer.configfile.settings.stepper_z.position_max|float %}
    {% set top = z_max - 5 %}
    RESPOND MSG="QC:Z_TAP_CALIB:START"
    _QC_BOARD_FAN_ON
    {% for i in range(n) %}
        RESPOND MSG="QC:ZTAP_ITER:{i + 1}/{n}"
        G90
        G1 Z{top} F1800
        M400
        YUMI_Z_TAP SAVE=0
    {% endfor %}
    G90
    G1 Z{top} F1800
    RESPOND MSG="QC:Z_TAP_CALIB:DONE"

# === 9 : SCREWS TILT ADJUST (process complet automatique, A FROID) ===
# Pas de chauffe : le sondage des vis se fait a froid (la chauffe plateau
# est deja validee par le test dedie QC_HEAT_BED).

[gcode_macro QC_SCREWS_TILT]
description: QC - Screws tilt adjust complet (a froid)
gcode:
    RESPOND MSG="QC:SCREWS_TILT:START"
    _QC_BOARD_FAN_ON
    {% if "xyz" in printer.toolhead.homed_axes %}
        SCREWS_TILT_CALCULATE
        RESPOND MSG="QC:SCREWS_TILT:PASS"
    {% else %}
        {action_respond_info("QC: machine non homee, screws tilt impossible")}
        RESPOND MSG="QC:SCREWS_TILT:FAIL"
    {% endif %}

# === 10 : BED MESH (complet, A FROID, SANS SAVE_CONFIG donc sans restart) ===

[gcode_macro QC_BED_MESH]
description: QC - Bed mesh complet a froid, sans restart
gcode:
    RESPOND MSG="QC:BED_MESH:START"
    _QC_BOARD_FAN_ON
    {% if "xyz" in printer.toolhead.homed_axes %}
        BED_MESH_CLEAR
        BED_MESH_CALIBRATE
        BED_MESH_PROFILE SAVE=default
        RESPOND MSG="QC:BED_MESH:PASS"
    {% else %}
        {action_respond_info("QC: machine non homee, bed mesh impossible")}
        RESPOND MSG="QC:BED_MESH:FAIL"
    {% endif %}

# === 11-12 : FEED E0 / E1 JUSQU'AU CAPTEUR TETE (head_sensor PA8, a froid) ===
# Pousse le filament depuis le YMS jusqu'au switch tete head_sensor (!PA8).
# Valide TOUTE la chaine : moteur feeder + chemin filament jusqu'a la tete +
# capteur tete (filament_detected passe a True). A FROID, par paliers, jusqu'a
# maxd (600mm) max -> sinon FAIL. (PA14 = palpeur Z inductif, sans rapport.)
# Pre-requis operateur : filament dans YMS-1/YMS-2 jusqu'au merger, et PAS
# deja a la tete (sinon FAIL "deja a la tete").

# Semantique systeme (comme la prod) :
#   T0 = pas en impression -> desync tous les feeders (sert de RESET)
#   T1 = active YMS-1 (sync extruder0)  |  T2 = active YMS-2 (sync extruder1)
[gcode_macro T0]
description: QC - Desync tous les feeders (reset / pas en impression)
gcode:
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder0 MOTION_QUEUE=
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=

[gcode_macro T1]
description: QC - Active YMS-1 (sync extruder0 sur l'extruder principal)
gcode:
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder0 MOTION_QUEUE=extruder

[gcode_macro T2]
description: QC - Active YMS-2 (sync extruder1 sur l'extruder principal)
gcode:
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder0 MOTION_QUEUE=
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder

# Macro UNIQUE (TOOL=1 pour YMS-1/E0, TOOL=2 pour YMS-2/E1) -> nom SANS chiffre
# median (Klipper tronque "QC_E0_HEAD" en "QC_E0" inconnu). Valide DEUX choses :
#  - le motion sensor YMS (encodeur, cablage jusqu'a la carte mere) change d'etat
#    quand le filament avance (non-detecte -> detecte)
#  - le capteur tete PA8 detecte l'arrivee du filament
[gcode_macro QC_HEAD_FEED]
description: QC - Feed YMS + valide motion sensor + capteur tete (TOOL=1 ou 2)
gcode:
    {% set tool = params.TOOL|default(1)|int %}
    {% if tool == 2 %}
        {% set id = "E1_HEAD" %}{% set feeder = "extruder1" %}{% set sensor = "YMS-2" %}
    {% else %}
        {% set id = "E0_HEAD" %}{% set feeder = "extruder0" %}{% set sensor = "YMS-1" %}
    {% endif %}
    RESPOND MSG="QC:{id}:START"
    # 1) RESET : T0 (desync) + extrude a vide -> l'extruder principal tourne mais
    #    le feeder YMS ne bouge pas -> le motion sensor passe en NON-DETECTE.
    T0
    SET_FILAMENT_SENSOR SENSOR={sensor} ENABLE=1
    M83
    G92 E0
    G1 E150 F6000
    M400
    # 2) Active le bon YMS (T1/T2) + lance le feed (valide motion sensor + tete)
    {% if tool == 2 %}T2{% else %}T1{% endif %}
    _QC_HEAD_FEED FEEDER={feeder} ID={id} SENSOR={sensor} MODE=feed

[gcode_macro _QC_HEAD_FEED]
description: QC - Setup feed + boucle (valide capteur tete PA8 ET motion sensor YMS)
variable_id: ""
variable_feeder: ""
variable_sensor: ""
variable_pushed: 0
variable_chunk: 25
variable_maxd: 800
variable_yms_seen: 0
variable_mode: "feed"
gcode:
    SET_GCODE_VARIABLE MACRO=_QC_HEAD_FEED VARIABLE=id VALUE="'{params.ID}'"
    SET_GCODE_VARIABLE MACRO=_QC_HEAD_FEED VARIABLE=feeder VALUE="'{params.FEEDER}'"
    SET_GCODE_VARIABLE MACRO=_QC_HEAD_FEED VARIABLE=sensor VALUE="'{params.SENSOR}'"
    SET_GCODE_VARIABLE MACRO=_QC_HEAD_FEED VARIABLE=mode VALUE="'{params.MODE|default('feed')}'"
    SET_GCODE_VARIABLE MACRO=_QC_HEAD_FEED VARIABLE=pushed VALUE=0
    SET_GCODE_VARIABLE MACRO=_QC_HEAD_FEED VARIABLE=yms_seen VALUE=0
    SET_GCODE_VARIABLE MACRO=_QC_HEAD_FEED VARIABLE=maxd VALUE={params.MAXD|default(800)|int}
    _QC_BOARD_FAN_ON
    UPDATE_DELAYED_GCODE ID=_qc_head_step DURATION=0.3

# Boucle unique : lit le capteur tete (PA8) + le motion sensor YMS, puis pousse
# un palier. M83 + sync reaffirmes dans le palier (ne persistent pas en
# delayed_gcode). Palier 25mm @ F600 -> cadence la boucle (pas de spin/hang).
# yms_seen passe a 1 des que le motion sensor detecte du mouvement.
[delayed_gcode _qc_head_step]
gcode:
    {% set v = printer["gcode_macro _QC_HEAD_FEED"] %}
    {% set id = v.id %}
    {% set feeder = v.feeder %}
    {% set sensor = v.sensor %}
    {% set pushed = v.pushed|int %}
    {% set head = printer["filament_switch_sensor head_sensor"].filament_detected %}
    {% set yms = printer["filament_motion_sensor " ~ sensor].filament_detected %}
    {% if yms and v.yms_seen|int == 0 %}
        SET_GCODE_VARIABLE MACRO=_QC_HEAD_FEED VARIABLE=yms_seen VALUE=1
        {action_respond_info("QC %s: motion sensor %s a change d'etat (mouvement detecte)" % (id, sensor))}
    {% endif %}
    {% if head %}
        {% if pushed == 0 and v.mode != "cutter" %}
            RESPOND TYPE=error MSG="QC {id}: filament deja a la tete avant feed (pas retire ?)"
            SYNC_EXTRUDER_MOTION EXTRUDER={feeder} MOTION_QUEUE=
            RESPOND MSG="QC:{id}:FAIL"
        {% elif v.mode == "cutter" %}
            # Filament arrive a la tete -> extrude 60mm doucement (sort de la buse
            # chaude), coupe, puis retracte 120mm. Valide le protocole de coupe.
            M109 S220
            M83
            SYNC_EXTRUDER_MOTION EXTRUDER={feeder} MOTION_QUEUE=extruder
            G1 E60 F300
            M400
            CUT_FILAMENT
            G1 E-120 F1200
            M400
            SYNC_EXTRUDER_MOTION EXTRUDER={feeder} MOTION_QUEUE=
            M104 S0
            {action_respond_info("QC %s: filament a la tete (%dmm) -> extrude 60 + coupe + retracte 120" % (id, pushed))}
            RESPOND MSG="QC:{id}:VISUAL"
        {% elif v.yms_seen|int == 1 %}
            {action_respond_info("QC %s: filament a la tete apres %dmm + motion sensor %s OK" % (id, pushed, sensor))}
            # Une fois detecte, 20cm de retraction suffit (pas besoin de tout sortir)
            M83
            G1 E-{[pushed, 200]|min} F1200
            M400
            SYNC_EXTRUDER_MOTION EXTRUDER={feeder} MOTION_QUEUE=
            RESPOND MSG="QC:{id}:PASS"
        {% else %}
            RESPOND TYPE=error MSG="QC {id}: filament a la tete mais motion sensor {sensor} n'a PAS change d'etat (cablage / capteur HS)"
            M83
            G1 E-{[pushed, 200]|min} F1200
            M400
            SYNC_EXTRUDER_MOTION EXTRUDER={feeder} MOTION_QUEUE=
            RESPOND MSG="QC:{id}:FAIL"
        {% endif %}
    {% elif pushed >= v.maxd|int %}
        RESPOND TYPE=error MSG="QC {id}: filament pas a la tete apres {v.maxd}mm (chemin bouche / moteur / capteur HS)"
        M83
        G1 E-{pushed} F1200
        M400
        SYNC_EXTRUDER_MOTION EXTRUDER={feeder} MOTION_QUEUE=
        RESPOND MSG="QC:{id}:FAIL"
    {% else %}
        M83
        SYNC_EXTRUDER_MOTION EXTRUDER={feeder} MOTION_QUEUE=extruder
        G1 E{v.chunk|int} F600
        M400
        SET_GCODE_VARIABLE MACRO=_QC_HEAD_FEED VARIABLE=pushed VALUE={pushed + v.chunk|int}
        UPDATE_DELAYED_GCODE ID=_qc_head_step DURATION=0.3
    {% endif %}

# === CLEANUP (fin de QC ou abort) ===

[gcode_macro QC_CLEANUP]
description: QC - Coupe chauffes/fans, capteurs, moteurs, boucle feed
gcode:
    RESPOND MSG="QC:CLEANUP:START"
    UPDATE_DELAYED_GCODE ID=_qc_head_step DURATION=0
    SET_FILAMENT_SENSOR SENSOR=YMS-1 ENABLE=0
    SET_FILAMENT_SENSOR SENSOR=YMS-2 ENABLE=0
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder0 MOTION_QUEUE=
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=
    M104 S0
    M140 S0
    M106 S0
    SET_FAN_SPEED FAN=Motherboard_Fan SPEED=0
    SET_FAN_SPEED FAN=hotend_fan SPEED=0
    M84
    RESPOND MSG="QC:CLEANUP:PASS"
