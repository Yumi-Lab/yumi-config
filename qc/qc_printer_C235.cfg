#####################################################################
# Motion sensors YMS E0 (PC14) / E1 (PC13) — encodeurs de mouvement.
# Lecture seule pour le QC : on lit filament_detected (= mouvement
# detecte). Pas de runout_gcode (le reset T0 + extrude a vide les
