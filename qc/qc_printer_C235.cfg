#####################################################################
# YUMI QC — printer.cfg dédié contrôle qualité usine
# GÉNÉRÉ depuis le backup de production 172.20.10.3 (machine 7-YMS
# hyperdrive) par qc/generate_qc_cfg.py — NE PAS éditer à la main.
#
# Géométrie/pins/courants = EXACTEMENT ceux de la machine de réf.
# Hyperdrive retiré : QC sur carte principale seule (E0/E1).
# Klipper démarre sans la box (pas de MCU /dev/ttyS2).
#
# Déploiement :
#   cp qc_printer.cfg ~/printer_data/config/qc_printer.cfg
# Le panel QC du SmartPad gère backup/swap/restart/restore.
#####################################################################

# Marqueur lu par le panel QC pour détecter que la cfg QC est active.
# variable_model = taille machine (sélecteur du panel), gravée ici.
[gcode_macro _QC_MODE]
description: Marqueur mode QC actif
variable_active: 1
variable_model: "C235"
gcode:
    RESPOND MSG="QC mode actif"

[gcode_macro DEVICE]
description: Identite YUMI de toutes les cartes connectees (multi-MCU)
gcode:
    {% set ns = namespace(found=false) %}
    {% for name in printer.configfile.settings %}
      {% if name == "mcu" or name.startswith("mcu ") %}
        {% set c = printer[name].mcu_constants if printer[name] is defined else {} %}
        {% if c.YUMI_CONFIG is defined and c.YUMI_CONFIG %}
          {% set ns.found = true %}
          {action_respond_info("[" ~ name ~ "] " ~ c.YUMI_CONFIG)}
          {% if c.YUMI_COMMENT is defined and c.YUMI_COMMENT %}
            {action_respond_info("[" ~ name ~ "] comment: " ~ c.YUMI_COMMENT)}
          {% endif %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {% if not ns.found %}{action_respond_info("Aucune identite YUMI trouvee sur les MCU")}{% endif %}

