speed: 200
screw_thread: CCW-M3

[homing_override]
axes: xyz
set_position_z: 0
gcode:
  G1 Z10 F300
  {% set home_all = 'X' not in params and 'Y' not in params and 'Z' not in params %}
  {% if home_all or 'X' in params%}
    G1 Z10 F1800
    SET_KINEMATIC_POSITION X=0
    G1 X-5 F1800
    G28 X F1800
    G1 X253 F1800
    G28 X F1800
  {% endif %}

  {% if home_all or 'Y' in params%}
    G1 Z10
    G28 Y
  {% endif %}

  {% if 'Z' in params %}
    G1 Z10
    G1 X128.5 Y119.5 F1800
    G4 P1000
    G28 Z
    G1 Z10
  {% endif %}

  {% if home_all%}
    G1 Z10 F1800
    SET_KINEMATIC_POSITION X=0
    G1 X-5 F1800
    G28 X F1800
    G1 X253 F1800
    G28 X F1800

    G1 Z10
    G28 Y

    G1 Z10
    G1 X128.5 Y119.5 F9000
    G4 P1000
    G28 Z
    G1 Z10
  {% endif %}

[delayed_gcode welcome]
initial_duration: 1
gcode:
  BED_MESH_PROFILE LOAD=default
  M117 Welcome!
