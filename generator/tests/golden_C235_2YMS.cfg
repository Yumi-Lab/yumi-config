[filament_motion_sensor YMS-1]
switch_pin: !PC14
detection_length: 50
pause_on_runout: False
extruder: extruder
runout_gcode:
  RESPOND TYPE=error MSG="Runout YMS-1"
  M117 Runout YMS-1
  {% set print_state = printer.print_stats.state %}
  {% if print_state in ['printing', 'paused'] %}
    PAUSE
    RESPOND TYPE=error MSG="YMS-1 filament encoder runout"
    M117 YMS-1 filament encoder runout
  {% else %}
    RESPOND TYPE=error MSG="YMS-1 No printing running!"
    M117 YMS-1 No printing running!
  {% endif %}
insert_gcode:
  RESPOND TYPE=error MSG="Insert YMS-1"
  M117 Insert YMS-1
  SAVE_VARIABLE VARIABLE=yms_1_sensor VALUE=True
  {% if printer.save_variables.variables.printing_start %}
    T0
    RESPOND TYPE=error MSG="YMS-1 Printing running!"
  {% else %}
    T1
    RESPOND TYPE=error MSG="YMS-1 No printing running!"
  {% endif %}
  M117 YMS-1 Loading
  RESPOND MSG="YMS-1 Loading..."
  LOAD_YMS

[extruder_stepper extruder1]
extruder:
