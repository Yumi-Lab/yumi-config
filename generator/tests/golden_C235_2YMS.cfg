[gcode_macro SET_PRESSURE_ADVANCE]
rename_existing: SET_PA_ORIG
gcode:
  {% set pa = params.ADVANCE|default(none) %}
  {% set st = params.SMOOTH_TIME|default(0.040) %}
  {% if pa is not none %}
    SET_PA_ORIG EXTRUDER=extruder ADVANCE={pa} SMOOTH_TIME={st}
    SET_PA_ORIG EXTRUDER=extruder0 ADVANCE={pa} SMOOTH_TIME={st}
    SET_PA_ORIG EXTRUDER=extruder1 ADVANCE={pa} SMOOTH_TIME={st}
  {% else %}
    SET_PA_ORIG {printer.gcode.move_parameters}
  {% endif %}

[gcode_macro SET_EXTRA_FLUSH]
description: Set purge parameters
gcode:
  {% if 'LENGTH' in params %}
    {% set new_length = params.LENGTH|float %}
    SAVE_VARIABLE VARIABLE=extra_purge_length VALUE={new_length}
    { action_respond_info("Purge length set to %.1fmm" % new_length) }
  {% endif %}
  {% if 'SPEED' in params %}
    {% set new_speed = params.SPEED|float %}
    SAVE_VARIABLE VARIABLE=extra_purge_speed VALUE={new_speed}
    { action_respond_info("Purge speed set to %.1fmm/s" % new_speed) }
  {% endif %}
  {% if not 'LENGTH' in params and not 'SPEED' in params %}
    { action_respond_info("Usage: SET_EXTRA_PURGE LENGTH=<value> SPEED=<value>") }
  {% endif %}

[gcode_macro EXTRA_FLUSH]
description: Extrude extra filament for purge
gcode:
  {% set svv = printer.save_variables.variables %}
  {% set length = svv.extra_purge_length|default(0)|float %}
  {% set speed = svv.extra_purge_speed|default(5)|float %}
  {% if printer.extruder.can_extrude|lower == 'true' %}
    G92 E0
    G1 E{length} F{speed * 60}
    { action_respond_info("Purge: %.1fmm @ %.1fmm/s" % (length, speed)) }
  {% else %}
    { action_respond_error("ERROR: Temperature too low!") }
  {% endif %}

[gcode_macro INIT_PURGE_VARS]
description: Initialize purge variables
gcode:
  {% if 'extra_purge_length' not in printer.save_variables.variables %}
    SAVE_VARIABLE VARIABLE=extra_purge_length VALUE=0.0
  {% endif %}
  {% if 'extra_purge_speed' not in printer.save_variables.variables %}
    SAVE_VARIABLE VARIABLE=extra_purge_speed VALUE=5.0
  {% endif %}

[gcode_macro LOAD_YMS]
description: Load filament into the YMS box
gcode:
  {% if printer.save_variables.variables.printing_start %}
    {% set insert_length = 200|int %}
    {% set speed = 1000|int %}
    G92 E0
    G1 E{insert_length} F{speed}
    G92 E0
    RESPOND MSG="Filament loaded {insert_length}mm at {speed}mm/min"
  {% else %}
    {% set insert_length = 50|int %}
    {% set speed = 1000|int %}
    G92 E0
    G1 E{insert_length} F{speed}
    G92 E0
    RESPOND MSG="Filament loaded {insert_length}mm at {speed}mm/min"
    T0
  {% endif %}

[delayed_gcode INIT_YMS]
initial_duration: 0.01
gcode:
  RESPOND TYPE=error MSG="INIT YMS"
  M117 INIT YMS
  INIT_PURGE_VARS
  T0

[gcode_macro CUT_FILAMENT]
description: Cut filament with speed profile
gcode:
  G1 X8 F42000
  G1 X-8 F300
  G1 X8 F42000

[gcode_macro CAT_FILAMENT]
description: Full retract filament from hotend
gcode:
  G1 X258 F8000
  G92 E0
  G1 E-30 F12000
  G92 E0
  G4 P5000
  G1 E-90 F5000

[gcode_macro CHECK_FILAMENT]
gcode:
  {% set SENSOR = "YMS-1" %}
  SET_FILAMENT_SENSOR SENSOR={SENSOR} STATUS=0
  G4 P1000
  M83
  G1 E5 F100
  QUERY_FILAMENT_SENSOR SENSOR={SENSOR}

[gcode_macro TOFF]
description: Disable all YMS extruders
gcode:
  SET_FILAMENT_SENSOR SENSOR=YMS-1 ENABLE=0
  SET_FILAMENT_SENSOR SENSOR=YMS-2 ENABLE=0
  SYNC_EXTRUDER_MOTION EXTRUDER=extruder MOTION_QUEUE=extruder
  SYNC_EXTRUDER_MOTION EXTRUDER=extruder0 MOTION_QUEUE=""
  SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=""
  RESPOND MSG="DISABLE ALL YMS"

[gcode_macro MOTION_SENSOR_INIT]
description: Initialize YMS and simulate extrusion length
gcode:
  M82
  M18
  G92 E0
  G1 E50 F400000
  G92 E0
  M18

[gcode_macro T0]
description: ACTIVATE YMS-1 OR INIT YMS SYSTEM
gcode:
  {% set svv = printer.save_variables.variables %}
  {% if printer.save_variables.variables.printing_start %}
    SET_FILAMENT_SENSOR SENSOR=YMS-1 ENABLE=1
    SET_FILAMENT_SENSOR SENSOR=YMS-2 ENABLE=0
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder MOTION_QUEUE=extruder
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder0 MOTION_QUEUE=extruder
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=""
    RESPOND MSG="ACTIVATION YMS-1"
    SAVE_VARIABLE VARIABLE=active_tool VALUE=1
  {% else %}
    RESPOND MSG="YMS INITIALISATION STARTING"
    G92 E0
    SET_KINEMATIC_POSITION E=0
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder MOTION_QUEUE=extruder
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder0 MOTION_QUEUE=""
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=""
    SAVE_VARIABLE VARIABLE=active_tool VALUE=0
    MOTION_SENSOR_INIT
    SET_FILAMENT_SENSOR SENSOR=YMS-1 ENABLE=1
    SET_FILAMENT_SENSOR SENSOR=YMS-2 ENABLE=1
    M400
    SAVE_VARIABLE VARIABLE=yms_sensor_initialisation VALUE=True
    RESPOND MSG="INSERT NEXT FILAMENT"
  {% endif %}

[gcode_macro T1]
description: ACTIVATE YMS-2
gcode:
  {% set svv = printer.save_variables.variables %}
  {% if printer.save_variables.variables.printing_start %}
    SET_FILAMENT_SENSOR SENSOR=YMS-1 ENABLE=0
    SET_FILAMENT_SENSOR SENSOR=YMS-2 ENABLE=1
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder MOTION_QUEUE=extruder
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder0 MOTION_QUEUE=""
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder
    RESPOND MSG="ACTIVATION YMS-2"
    SAVE_VARIABLE VARIABLE=active_tool VALUE=2
  {% else %}
    SET_FILAMENT_SENSOR SENSOR=YMS-1 ENABLE=1
    SET_FILAMENT_SENSOR SENSOR=YMS-2 ENABLE=0
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder MOTION_QUEUE=extruder
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder0 MOTION_QUEUE=extruder
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=""
    SAVE_VARIABLE VARIABLE=active_tool VALUE=2
  {% endif %}

[gcode_macro CURRENT_UNLOAD]
description: Set low current on all YMS extruders for unload
gcode:
  SET_TMC_CURRENT STEPPER=extruder0 CURRENT=0.5 HOLDCURRENT=0.5
  SET_TMC_CURRENT STEPPER=extruder1 CURRENT=0.5 HOLDCURRENT=0.5

[gcode_macro PAUSE]
description: Pause the running print
rename_existing: PAUSE_BASE
variable_extrude: 5.0
gcode:
  SAVE_VARIABLE VARIABLE=fan_speed VALUE={printer.fan.speed * 255}
  {% set act_x = printer.toolhead.position.x|float %}
  {% set act_y = printer.toolhead.position.y|float %}
  {% set act_z = printer.toolhead.position.z|float %}
  SAVE_VARIABLE VARIABLE=pause_x VALUE={act_x}
  SAVE_VARIABLE VARIABLE=pause_y VALUE={act_y}
  SAVE_VARIABLE VARIABLE=pause_z VALUE={act_z}
  M106 S0
  {% set E = printer["gcode_macro PAUSE"].extrude|float %}
  {% set x_park = printer.toolhead.axis_maximum.x|float %}
  {% set y_park = printer.toolhead.axis_maximum.y|float / 2 %}
  {% set max_z = printer.toolhead.axis_maximum.z|float %}
  {% set act_z = printer.toolhead.position.z|float %}
  {% if act_z < (max_z - 2.0) %}
    {% set z_safe = 2.0 %}
  {% else %}
    {% set z_safe = max_z - act_z %}
  {% endif %}
  PAUSE_BASE
  G91
  {% if printer.extruder.can_extrude|lower == 'true' %}
    G1 E-{E} F2100
  {% else %}
    {action_respond_info("Extruder not hot enough")}
  {% endif %}
  {% if "xyz" in printer.toolhead.homed_axes %}
    G1 Z{z_safe} F900
    G90
    G1 X{x_park} Y{y_park} F6000
  {% else %}
    {action_respond_info("Printer not homed")}
  {% endif %}
  M117 Pause

[gcode_macro RESUME]
description: Resume the running print
rename_existing: RESUME_BASE
variable_prime: 40.0
gcode:
  {% set svv = printer.save_variables.variables %}
  {% set fan_speed = svv.fan_speed|default(0)|int %}
  {% set x_park = printer.toolhead.axis_maximum.x|float %}
  G1 X{x_park} F6000
  {% if 'pause_x' in svv and 'pause_y' in svv and 'pause_z' in svv %}
    {% set px = svv.pause_x|float %}
    {% set py = svv.pause_y|float %}
    {% set pz = svv.pause_z|float %}
  {% else %}
    {action_respond_info("Pause coordinates not found.")}
    M117 ERROR: Pause position unknown.
  {% endif %}
  {% set E = printer["gcode_macro PAUSE"].extrude|float %}
  {% if 'VELOCITY' in params|upper %}
    {% set get_params = ('VELOCITY=' + params.VELOCITY) %}
  {% else %}
    {% set get_params = "" %}
  {% endif %}
  {% if printer.extruder.can_extrude|lower == 'true' %}
    G91
    G1 E{prime|float} F300
    G92 E0
    M106 S255
    G4 P5000
    G90
    G1 X{x_park - 11} F26000
    G92 E0
    G1 X{px} Y{py} Z{pz} F6000
    G1 E{E} F10800
    M106 S{fan_speed}
  {% else %}
    {action_respond_info("Extruder not hot enough")}
  {% endif %}
  RESUME_BASE {get_params}
  M117 Printing...

[gcode_macro CANCEL_PRINT]
rename_existing: CANCEL_PRINT_DEFAULT
description: Cancel print, retract and park head safely
gcode:
  M220 S100
  M221 S100
  SAVE_VARIABLE VARIABLE=was_interrupted VALUE=False
  SAVE_VARIABLE VARIABLE=printing_start VALUE=False
  {% set retract_mm = 20.0 %}
  {% set z_lift = 10.0 %}
  {% set x_park = printer.configfile.settings['stepper_x']['position_max']|float %}
  {% set y_park = printer.configfile.settings['stepper_y']['position_max']|float %}
  {% set z_max = printer.toolhead.axis_maximum.z|float %}
  {% set minT = printer.configfile.settings['extruder']['min_extrude_temp']|float %}
  SET_VELOCITY_LIMIT ACCEL=20000 ACCEL_TO_DECEL=10000
  {% if printer.extruder.temperature >= minT %}
    G1 E-{retract_mm} F11000
    G92 E0
  {% endif %}
  G91
  {% set dz = z_lift if (printer.gcode_move.position.z + z_lift) < z_max else (z_max - printer.gcode_move.position.z) %}
  G1 Z+{dz} F3000
  G90
  G1 X{x_park} F9000
  G1 Y{y_park} F3000
  G92 E0
  G1 E-15 F100
  G92 E0
  G1 E-10 F100
  G92 E0
  G1 E-85 F4000
  ALL_FAN_OFF
  TURN_OFF_HEATERS
  M84
  {action_respond_info("Cancel Print executed")}
  CANCEL_PRINT_DEFAULT

[gcode_macro PRINT_START]
gcode:
  G92 E0

[gcode_macro PRINT_END]
description: Safety stop — slicer does real parking
gcode:
  ALL_FAN_OFF
  TURN_OFF_HEATERS
  M84

[gcode_macro ALL_FAN_OFF]
description: Turn off all fans
gcode:
  M107

[gcode_macro UNLOAD_FILAMENT]
description: Unload filament from hotend
gcode:
  {% if printer.extruder.temperature < 200 %}
    M109 S200
  {% endif %}
  G90
  G1 X0 F5000
  G1 X-12 F2000
  G92 E0
  G1 E-30 F800
  G1 X20 F5000

[gcode_macro LOAD_FILAMENT]
description: Load filament into hotend
gcode:
  {% if printer.extruder.temperature < 200 %}
    M109 S200
  {% endif %}
  G91
  G1 E50 F800
  G1 E30 F150
  G90

[gcode_macro SET_GCODE_OFFSET]
rename_existing: _SET_GCODE_OFFSET
gcode:
  {% if printer.save_variables.variables.gcode_offsets %}
    {% set offsets = printer.save_variables.variables.gcode_offsets %}
  {% else %}
    {% set offsets = {'x': None,'y': None,'z': None} %}
  {% endif %}
  {% set ns = namespace(offsets={'x': offsets.x,'y': offsets.y,'z': offsets.z}) %}
  _SET_GCODE_OFFSET {% for p in params %}{'%s=%s '% (p, params[p])}{% endfor %}
  {%if 'X' in params %}{% set null = ns.offsets.update({'x': params.X}) %}{% endif %}
  {%if 'Y' in params %}{% set null = ns.offsets.update({'y': params.Y}) %}{% endif %}
  {%if 'Z' in params %}{% set null = ns.offsets.update({'z': params.Z}) %}{% endif %}
  {%if 'Z_ADJUST' in params %}
    {%if ns.offsets.z == None %}{% set null = ns.offsets.update({'z': 0}) %}{% endif %}
    {% set null = ns.offsets.update({'z': (ns.offsets.z | float) + (params.Z_ADJUST | float)}) %}
  {% endif %}
  SAVE_VARIABLE VARIABLE=gcode_offsets VALUE="{ns.offsets}"

[gcode_macro PID_BED]
description: PID calibration for bed
gcode:
  {% if printer.idle_timeout.state == "Printing" %}
    {action_respond_info("Can't run during print!")}
  {% else %}
    {% if printer.toolhead.homed_axes != "xyz" %}
      G28
    {% endif %}
    G1 Z50 F1500
    M400
    PID_CALIBRATE HEATER=heater_bed TARGET={params.TEMP|default(65)}
  {% endif %}

[gcode_macro PID_HOTEND]
description: PID calibration for hotend
gcode:
  {% if printer.idle_timeout.state == "Printing" %}
    {action_respond_info("Can't run during print!")}
  {% else %}
    {% if printer.toolhead.homed_axes != "xyz" %}
      G28
    {% endif %}
    G1 Z50 F1500
    M400
    M106
    PID_CALIBRATE HEATER=extruder TARGET={params.TEMP|default(220)}
    M107
  {% endif %}

[gcode_macro ADXL_AXE_X]
description: Resonance test X axis
gcode:
  {% if printer.toolhead.homed_axes != "xyz" %}
    G28
  {% endif %}
  M400
  SHAPER_CALIBRATE AXIS=X

[gcode_macro ADXL_AXE_Y]
description: Resonance test Y axis
gcode:
  {% if printer.toolhead.homed_axes != "xyz" %}
    G28
  {% endif %}
  M400
  SHAPER_CALIBRATE AXIS=Y

[gcode_macro SAVECONFIG]
description: Save configuration
gcode:
  SAVE_CONFIG

[gcode_macro SMART_HOME]
description: Home all axes safely
gcode:
  G28 XY
  G1 X30 Y200 F6000
  G4 P1000
  G28 Z
  G1 Z10

[gcode_macro BED_DETECTION]
gcode:
  {% set x_park = printer.configfile.settings['stepper_x']['position_max']|float %}
  {% set y_park = printer.configfile.settings['stepper_y']['position_max']|float %}
  {% set z_max = printer.configfile.settings['stepper_z']['position_max']|float %}
  G28 X
  G28 Y
  SET_KINEMATIC_POSITION Z={z_max - 20}
  G90
  G1 X{x_park / 2 - 19} Y{y_park - 23} F12000
  PROBE
  SET_KINEMATIC_POSITION Z=0
  G1 Z10 F500
  G1 X{x_park - 14} Y{y_park - 23} F12000
  PROBE
  SET_KINEMATIC_POSITION Z=0
  G1 Z10 F500
  G1 X{x_park} F9000
  G1 Y{y_park - 2} F12000

[gcode_macro PROBE_CALIBRATE]
rename_existing: BASE_PROBE_CALIBRATE
gcode:
  {% set x_park = printer.configfile.settings['stepper_x']['position_max']|float %}
  {% set y_park = printer.configfile.settings['stepper_y']['position_max']|float %}
  BED_DETECTION
  G1 X{x_park / 2} Y{y_park / 2} F12000
  BASE_PROBE_CALIBRATE

[gcode_macro SCREWS_TILT_CALCULATE]
rename_existing: BASE_SCREWS_TILT_CALCULATE
gcode:
  {% set x_park = printer.configfile.settings['stepper_x']['position_max']|float %}
  {% set y_park = printer.configfile.settings['stepper_y']['position_max']|float %}
  BED_DETECTION
  M190 S65
  BASE_SCREWS_TILT_CALCULATE
  G1 X{x_park / 2} Y{y_park - 2} F6000
  G1 Z20 F500
  M140 S0

[gcode_macro BED_MESH_CALIBRATE]
rename_existing: BASE_BED_MESH_CALIBRATE
description: Bed mesh with preheat and auto homing
gcode:
  {% set profile_name = params.PROFILE|default('default')|string %}
  BED_DETECTION
  G1 Z100
  M190 S65
  G4 P60000
  BASE_BED_MESH_CALIBRATE PROFILE={profile_name}
  BED_MESH_PROFILE SAVE={profile_name}
  SAVE_CONFIG

[gcode_macro CALCULATE_Z_OFFSET]
description: Calculate Z offset via pressure probe
gcode:
  {% set SAVE_PARAM = params.SAVE|default(0)|int %}
  YUMI_CALCULATE_Z_OFFSET SAVE={SAVE_PARAM}

[gcode_macro M106]
rename_existing: G106
gcode:
  {% if params.P is defined %}
    {% if params.P|int == 2 %}
      {% if params.S is defined %}
        {% if params.S|int == 255 %}
          {% set realspeed = 1 %}
        {% elif params.S|int == 0 %}
          {% set realspeed = 0 %}
        {% else %}
          {% set realspeed = params.S|float/255 %}
        {% endif %}
      {% else %}
        {% set realspeed = 1 %}
      {% endif %}
      SET_FAN_SPEED FAN=Aux_Fan SPEED={realspeed}
    {% endif %}
  {% else %}
    {% if params.S is defined %}
      G106 S{params.S}
    {% else %}
      G106 S255
    {% endif %}
  {% endif %}

[gcode_macro M107]
rename_existing: G107
gcode:
  {% if params.P is defined %}
    {% if params.P|int == 2 %}
      SET_FAN_SPEED FAN=Aux_Fan SPEED=0
    {% endif %}
  {% else %}
    SET_FAN_SPEED FAN=Aux_Fan SPEED=0
    G107
  {% endif %}

[gcode_macro M201]
description: Sets maximum acceleration.
variable_max_accel: 1.7976931348623157e+308
gcode:
  {% if 'X' in params or 'Y' in params %}
    {% set accel = (params.X|default(params.Y)|float, params.Y|default(params.X)|float)|min %}
    SET_GCODE_VARIABLE MACRO=M201 VARIABLE=max_accel VALUE="{accel}"
  {% else %}
    SET_VELOCITY_LIMIT
  {% endif %}

[gcode_macro M203]
description: Sets maximum velocity.
gcode:
  {% if 'X' in params or 'Y' in params %}
    {% set velocity = (params.X|default(params.Y)|float, params.Y|default(params.X)|float)|min %}
    SET_VELOCITY_LIMIT VELOCITY="{velocity}"
  {% else %}
    SET_VELOCITY_LIMIT
  {% endif %}

[gcode_macro M205]
description: Sets square corner velocity.
gcode:
  {% if 'X' in params or 'Y' in params %}
    SET_VELOCITY_LIMIT SQUARE_CORNER_VELOCITY="{(params.X|default(0)|float, params.Y|default(0)|float)|min}"
  {% else %}
    SET_VELOCITY_LIMIT
  {% endif %}

[gcode_macro M900]
description: Set pressure advance (Marlin compat)
gcode:
  {% if 'K' in params %}
    {% if 'E' in params %}
      SET_PRESSURE_ADVANCE EXTRUDER={params.E} ADVANCE={params.K}
    {% else %}
      SET_PRESSURE_ADVANCE ADVANCE={params.K}
    {% endif %}
  {% endif %}
