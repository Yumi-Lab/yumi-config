# Yumi C-Series printer.cfg
# Model: C235 | YMS: 2 | Hotend: chroma_x12
# Generated by Yumi CFG Generator

[include plr.cfg]
[include timelapse.cfg]
[include moonraker_obico_macros.cfg]

[mcu]
serial: /dev/ttyS1
restart_method: command

[mcu rpi]
serial: /tmp/klipper_host_mcu

[printer]
kinematics: cartesian
max_velocity: 700
max_accel: 20000
max_z_velocity: 25
max_z_accel: 1000

[virtual_sdcard]
path: ~/printer_data/gcodes/

[save_variables]
filename: ~/printer_data/config/variables.cfg

[exclude_object]

[gcode_arcs]
resolution: 0.1

[idle_timeout]
timeout: 99999999

[display_status]

[pause_resume]

[adxl345]
cs_pin: rpi:gpio13
spi_bus: spidev1.0

[resonance_tester]
accel_chip: adxl345
probe_points: 115,115,20

[input_shaper]

[motor_constants BJ42D29-28V31]
