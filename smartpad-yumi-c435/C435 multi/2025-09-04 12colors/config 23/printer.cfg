[delayed_gcode INIT_YMS]
initial_duration: 0.01
gcode:
  RESPOND TYPE=error MSG="INIT YMS"
  M117 INIT YMS
  #INIT_PURGE_VARS
  T0
  
[gcode_macro CHECK_FILAMENT]
gcode:
  {% set SENSOR = "YMS-1" %}
  SET_FILAMENT_SENSOR SENSOR={SENSOR} STATUS=0
  G4 P1000  ; Pause 1s
  M83        ; Mode relatif
  G1 E5 F100 ; Avance lentement de 5mm
  QUERY_FILAMENT_SENSOR SENSOR={SENSOR}

[gcode_macro BED_DETECTION]
gcode: 
    {% set x_park = printer.configfile.settings['stepper_x']['position_max']|float %}
    {% set y_park = printer.configfile.settings['stepper_y']['position_max']|float %}
    {% set z_max = printer.configfile.settings['stepper_z']['position_max']|float %}
    #SET_TMC_CURRENT STEPPER=stepper_z CURRENT=1.00 HOLDCURRENT=0.50
    #M106 S140 P3
    G28 X
    G28 Y
    SET_KINEMATIC_POSITION Z={z_max - 1}
    G90
    G1 X{x_park / 2 - 19} Y{y_park - 35} F12000 
    PROBE
    SET_KINEMATIC_POSITION Z=0
    G1 Z10 F500
    G1 X{x_park - 14 } Y{y_park - 35 } F12000
    PROBE
    SET_KINEMATIC_POSITION Z=0
    #SET_TMC_CURRENT STEPPER=stepper_z CURRENT=1.00 HOLDCURRENT=0.50
    G1 Z10 F500  
    G1 X{x_park} F9000
    G1 Y{y_park - 2 } F12000
    #M106 S0 P3
    
[gcode_macro SCREWS_TILT_CALCULATE]
rename_existing: BASE_SCREWS_TILT_CALCULATE
gcode:
    {% set x_park = printer.configfile.settings['stepper_x']['position_max']|float %}
    {% set y_park = printer.configfile.settings['stepper_y']['position_max']|float %}
    {% set z_max = printer.configfile.settings['stepper_z']['position_max']|float %}
    BED_DETECTION
    #M106 S140 P3
    M190 S65     # Attendre que le plateau chauffe
    BASE_SCREWS_TILT_CALCULATE
    G1 X{x_park / 2} Y{y_park - 2} F12000  # Déplacement XY à 200 mm/s
    G1 Z20 F500         
    M140 S0
    #M106 S0 P3
    

[gcode_macro BED_MESH_CALIBRATE]
rename_existing: BASE_BED_MESH_CALIBRATE
description: Calibration du plateau avec préchauffage et homing automatique
gcode:
    # Récupérer le nom du profil
    {% set profile_name = params.PROFILE|default('default')|string %}
    BED_DETECTION
    M106 S140 P3
    G1 Z100  
    M190 S65     # Attendre la température
    G4 P60000 # Attendre que le plateau se stabilise
    BASE_BED_MESH_CALIBRATE PROFILE={profile_name}
    BED_MESH_PROFILE SAVE={profile_name}
    SAVE_CONFIG
    

[gcode_macro CUT_FILAMENT]
description: Coupe du filament avec profil de vitesse
gcode:
    G1 X8 F42000            ; Position d'approche rapide
    G1 X-8 F300                ; Déplacement complet de coup
    G1 X8 F42000            ; Position d'approche rapide
    
[gcode_macro SET_PRESSURE_ADVANCE]
rename_existing: SET_PA_ORIG
gcode:
    # Récupère les paramètres envoyés par le slicer
    {% set pa = params.ADVANCE|default(none) %}
    {% set st = params.SMOOTH_TIME|default(0.040) %}
    {% if pa is not none %}
      # Applique la valeur sur chaque extrudeur/stubber que vous utilisez
      SET_PA_ORIG EXTRUDER=extruder0 ADVANCE={pa} SMOOTH_TIME={st}
      SET_PA_ORIG EXTRUDER=extruder1 ADVANCE={pa} SMOOTH_TIME={st}
      SET_PA_ORIG EXTRUDER=extruder2 ADVANCE={pa} SMOOTH_TIME={st}
      SET_PA_ORIG EXTRUDER=extruder3 ADVANCE={pa} SMOOTH_TIME={st}
      SET_PA_ORIG EXTRUDER=extruder4 ADVANCE={pa} SMOOTH_TIME={st}
      SET_PA_ORIG EXTRUDER=extruder5 ADVANCE={pa} SMOOTH_TIME={st}
      SET_PA_ORIG EXTRUDER=extruder6 ADVANCE={pa} SMOOTH_TIME={st}
    {% else %}
      # Si ADVANCE n’est pas spécifié, renvoyer la commande d’origine
      SET_PA_ORIG {printer.gcode.move_parameters}
    {% endif %}
    
[save_variables]
filename: ~/printer_data/config/variables.cfg

[gcode_macro SET_EXTRA_FLUSH]
description: Définit les paramètres de purge
gcode:
  {% if 'LENGTH' in params %}
    {% set new_length = params.LENGTH|float %}
    SAVE_VARIABLE VARIABLE=extra_purge_length VALUE={new_length}
    { action_respond_info("Longueur purge définie à %.1fmm" % new_length) }
  {% endif %}
  
  {% if 'SPEED' in params %}
    {% set new_speed = params.SPEED|float %}
    SAVE_VARIABLE VARIABLE=extra_purge_speed VALUE={new_speed}
    { action_respond_info("Vitesse purge définie à %.1fmm/s" % new_speed) }
  {% endif %}
  
  {% if not 'LENGTH' in params and not 'SPEED' in params %}
    { action_respond_info("Utilisation: SET_EXTRA_PURGE LENGTH=<valeur> SPEED=<valeur>") }
  {% endif %}

[gcode_macro EXTRA_FLUSH]
description: Extrude une quantité supplémentaire de filament
gcode:
  {% set svv = printer.save_variables.variables %}
  {% set length = svv.extra_purge_length|default(0)|float %}
  {% set speed = svv.extra_purge_speed|default(5)|float %}
  
  {% if printer.extruder.can_extrude|lower == 'true' %}
    #SAVE_GCODE_STATE NAME=EXTRA_PURGE_STATE
    #M83  ; Mode relatif pour extrudeur
    G92 E0
    G1 E{length} F{speed * 60}
    #RESTORE_GCODE_STATE NAME=EXTRA_PURGE_STATE
    { action_respond_info("Purge: %.1fmm @ %.1fmm/s" % (length, speed)) }
  {% else %}
    { action_respond_error("ERREUR: Température trop basse!") }
  {% endif %}

[gcode_macro INIT_FLUSH_VARS]
description: Initialise les variables de purge
gcode:
  {% if 'extra_purge_length' not in printer.save_variables.variables %}
    SAVE_VARIABLE VARIABLE=extra_purge_length VALUE=0.0
  {% endif %}
  {% if 'extra_purge_speed' not in printer.save_variables.variables %}
    SAVE_VARIABLE VARIABLE=extra_purge_speed VALUE=5.0
  {% endif %}
  { action_respond_info("Variables purge initialisées") }

[gcode_macro MOTION_SENSOR_INIT]
description: Initialize YMS and simulate extrusion length
gcode:
  M82
  M18
  G92 E0
  G1 E50 F400000  # Insert the filament with the specified length and speed
  G92 E0
  M18

  
