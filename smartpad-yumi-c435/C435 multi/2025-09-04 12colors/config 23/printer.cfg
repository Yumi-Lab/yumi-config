####################################################
####################################################
[include plr.cfg] #Load the camera recording function
[include timelapse.cfg] #Load the camera recording function

[idle_timeout]
timeout: 99999999                    # Délai avant extinction (7200s = 2h)

[mcu]
#serial: /dev/ttyACM0                                        #NANO V3.0 & V3.1
#serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0   #NANO V3.2
serial: /dev/ttyS1   #RJ11
restart_method: command

###################smartbox#################################
[mcu smartbox]
serial: /dev/ttyS2            #SMART MAKER 1.1 UART2 from GPIO or USB-C smartbox
restart_method: command


[printer]
kinematics: cartesian
max_velocity: 700
max_accel: 20000
max_z_velocity: 25
max_z_accel: 1000
square_corner_velocity: 20

[virtual_sdcard]
path: ~/printer_data/gcodes/

#参数保存文件
[save_variables]
filename:  ~/printer_data/config/variables.cfg

# Enable object exclusion
[exclude_object]

# Enable arcs support
[gcode_arcs]
resolution: 0.1

[mcu rpi]
serial: /tmp/klipper_host_mcu

[adxl345]
cs_pin: rpi:gpio13
spi_bus: spidev1.0

[resonance_tester]
accel_chip: adxl345
probe_points:
    115, 115, 20  # an example

[input_shaper]
#shaper_type_x = mzv
#shaper_freq_x = 76.8
#shaper_type_y = ei
#shaper_freq_y = 54.2

###################################驱动配置###########################################

[stepper_x]
step_pin: PB1
dir_pin: PB0
enable_pin: !PA15
microsteps: 16
rotation_distance: 40
endstop_pin: tmc2209_stepper_x: virtual_endstop
position_endstop: 456 #459
position_min: -10 #-10
position_max: 456 #356
homing_speed: 50
homing_retract_dist: 0

[stepper_y]
step_pin: PA1
dir_pin: !PA0
enable_pin: !PC5
microsteps: 16
rotation_distance: 40
endstop_pin: tmc2209_stepper_y: virtual_endstop
position_endstop: -18 #before -18
position_max: 439 #339
position_min: -18 #-24
homing_speed: 50
homing_retract_dist: 0

[tmc2209 stepper_x]
uart_pin: PB15
run_current: 1
hold_current: 0.8 # motor hold current
#sense_resistor: 0.11 
stealthchop_threshold: 0
driver_sgthrs: 100
diag_pin: PA13

[tmc2209 stepper_y]
uart_pin: PC11
run_current: 1.2 #0.9
#interpolate: true
#sense_resistor: 0.11 
hold_current: 0.800 # motor hold current
stealthchop_threshold: 0
driver_sgthrs: 100
diag_pin: PB9

[stepper_z]
step_pin: PC3
dir_pin: PC2
enable_pin: !PC4
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop #!PC13
#position_endstop: 0
position_max: 500
position_min: -20
homing_speed: 5
second_homing_speed: 5
homing_retract_dist: 5

[tmc2209 stepper_z]
uart_pin: PC10
interpolate: True
run_current: 1.0
hold_current: 0.500 # motor hold current
#sense_resistor: 0.11 
stealthchop_threshold: 0

[thermistor 100K4190YUMI]
temperature1:25
resistance1:100000
beta: 4190

############EXTRUDERS##############
[extruder]
max_extrude_only_velocity: 200
max_extrude_only_accel: 20000
step_pin: PA12
dir_pin: PA11 
enable_pin: PA3  
rotation_distance: 25 #before 33.500 #rotation_distance: 22.6789511 #Bondtech 5mm Drive Gears 
gear_ratio: 50:17    #TITAN Gear Ratio 3:1 ,  BMG Raatio 50:17
#rotation_distance: 4.5
microsteps: 16
full_steps_per_rotation: 200	#200 for 1.8 degree, 400 for 0.9 degree
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PC8
