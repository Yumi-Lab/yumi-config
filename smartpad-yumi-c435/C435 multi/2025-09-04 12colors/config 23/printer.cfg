# Couper tous les ventilateurs
# ------------------------------------------------------------
[gcode_macro ALL_FAN_OFF]
description: Coupe le fan de pièce et le ventilateur carte
gcode:
    M107                                 ; fan principal and back fan (part-cooling) off

