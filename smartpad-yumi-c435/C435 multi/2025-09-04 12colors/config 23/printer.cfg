    SYNC_EXTRUDER_MOTION EXTRUDER=extruder6 MOTION_QUEUE="" # Sync extruder motions YMS-7 
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder7 MOTION_QUEUE=""
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder8 MOTION_QUEUE=""
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder9 MOTION_QUEUE=""
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder10 MOTION_QUEUE=""
