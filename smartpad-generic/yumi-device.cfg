# Yumi-Lab — generic DEVICE macro (multi-MCU)
# Reads the YUMI_CONFIG / YUMI_COMMENT constants burned into each MCU
# firmware by the Yumi firmware builder. Type DEVICE in the console to print
# the board descriptor (board, cpu, conn, device, drivers, motors, lot,
# uid) + build comment for EVERY connected MCU (main + smartbox/hyperdrive).
# No machine-specific dependency: deployed to every pad via yumi-config.

[gcode_macro DEVICE]
description: Identite YUMI de toutes les cartes connectees (multi-MCU)
gcode:
    {% set ns = namespace(found=false) %}
    {% for name in printer.configfile.settings %}
      {% if name == "mcu" or name.startswith("mcu ") %}
        {% set c = printer[name].mcu_constants if printer[name] is defined else {} %}
        {% if c.YUMI_CONFIG is defined and c.YUMI_CONFIG %}
          {% set ns.found = true %}
          {action_respond_info("[" ~ name ~ "] " ~ c.YUMI_CONFIG)}
          {% if c.YUMI_COMMENT is defined and c.YUMI_COMMENT %}
            {action_respond_info("[" ~ name ~ "] comment: " ~ c.YUMI_COMMENT)}
          {% endif %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {% if not ns.found %}{action_respond_info("Aucune identite YUMI trouvee sur les MCU")}{% endif %}
