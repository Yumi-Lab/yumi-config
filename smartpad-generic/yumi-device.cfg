# Yumi-Lab — generic DEVICE macro
# Reads the YUMI_CONFIG constant burned into the MCU firmware by
# firmware.yumi-lab.com. Type DEVICE in the console to print the
# board descriptor (board, cpu, conn, printer, drivers, motors, lot, uid).
# No machine-specific dependency: deployed to every pad via yumi-config.

[gcode_macro DEVICE]
description: Print the YUMI_CONFIG descriptor burned into the MCU firmware
gcode:
    {% set cfg = printer.mcu.mcu_constants.get('YUMI_CONFIG', '') %}
    {% if cfg %}
        {action_respond_info(cfg)}
    {% else %}
        {action_respond_info("YUMI_CONFIG absent - firmware not built by firmware.yumi-lab.com (or constant empty).")}
    {% endif %}
